    <style>
        /* Estilos generales del cuerpo y el contenedor principal */
        :root {
            --color-neon-cyan: #00FFFF;
            --color-neon-magenta: #FF00FF;
            --color-dark-bg: #0A0A0A;
            --color-text-light: #E0E0E0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            background-color: var(--color-dark-bg);
            color: var(--color-text-light);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.05em; /* Espaciado sutil para un look "tech" */
        }
        
        /* Animación de fondo: un sutil resplandor que se mueve */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--color-neon-cyan), var(--color-neon-magenta), var(--color-dark-bg));
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            opacity: 0.15;
            z-index: -1;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor principal para centrar y dar margen al contenido */
        .portfolio-container {
            width: 90%;
            max-width: 900px;
            padding: 40px 20px;
            background: rgba(15, 15, 15, 0.7);
            border: 2px solid var(--color-neon-cyan);
            box-shadow: 0 0 20px var(--color-neon-cyan);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Estilo de los títulos principales y secundarios */
        h1, h2 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 10px var(--color-neon-cyan), 0 0 20px var(--color-neon-cyan);
            animation: neonGlow 1.5s ease-in-out infinite alternate;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 5px;
            color: var(--color-neon-magenta);
            animation: glitch 1.5s infinite;
        }

        h2 {
            font-size: 2rem;
            margin-top: 0;
            color: var(--color-neon-cyan);
        }
